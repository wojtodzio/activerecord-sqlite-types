name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} / Active Record ${{ matrix.activerecord }} / sqlite3 ${{ matrix.sqlite3 }}
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: activerecord_sqlite_types_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
      MUTANT_DISABLED: '1'
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: 5432
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: '3.1'
            activerecord: '7.1'
            sqlite3: '1.6'
            gemfile: gemfiles/activerecord_7_1_sqlite3_1.gemfile
            lint: false
          - ruby: '3.2'
            activerecord: '7.1'
            sqlite3: latest
            gemfile: gemfiles/activerecord_7_1_sqlite3_latest.gemfile
            lint: false
          - ruby: '3.2'
            activerecord: '7.2'
            sqlite3: latest
            gemfile: gemfiles/activerecord_7_2_sqlite3_latest.gemfile
            lint: true
          - ruby: '3.2'
            activerecord: '8.0'
            sqlite3: latest
            gemfile: gemfiles/activerecord_8_0_sqlite3_latest.gemfile
            lint: false
          - ruby: '4.0'
            activerecord: '8.1'
            sqlite3: latest
            gemfile: gemfiles/activerecord_8_1_sqlite3_latest.gemfile
            lint: false

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Print dependency versions
        run: bundle exec ruby -e 'require "active_record"; require "sqlite3"; puts "ruby=#{RUBY_VERSION} activerecord=#{ActiveRecord::VERSION::STRING} sqlite3=#{SQLite3::VERSION}"'
      - name: Run tests
        run: bundle exec rake test
      - name: Run standardrb
        if: matrix.lint
        run: bundle exec standardrb
